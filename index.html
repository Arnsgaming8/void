<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Interactive Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Syne', sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 20;
            mix-blend-mode: overlay;
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.02); }
        }
        
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 20;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
        
        .corner {
            position: fixed;
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 20;
        }
        
        .corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        
        .stats {
            position: fixed;
            top: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="overlay"></div>
    
    <div class="title">Nebula</div>
    
    <div class="hint">Move your cursor</div>
    
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    
    <div class="stats">
        <div id="particle-count">Particles: 0</div>
        <div id="fps">FPS: 0</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // Scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);
        
        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);
        
        // Particle system
        const PARTICLE_COUNT = 15000;
        const particles = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);
        
        // Color palette - cosmic colors
        const colorPalette = [
            new THREE.Color(0x6366f1),  // Indigo
            new THREE.Color(0x8b5cf6),  // Violet
            new THREE.Color(0xd946ef),  // Fuchsia
            new THREE.Color(0x06b6d4),  // Cyan
            new THREE.Color(0x22d3ee),  // Sky
            new THREE.Color(0xa855f7),  // Purple
        ];
        
        // Initialize particles
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const i3 = i * 3;
            
            // Spherical distribution
            const radius = 30 + Math.random() * 20;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i3 + 2] = radius * Math.cos(phi);
            
            // Random velocities
            velocities[i3] = (Math.random() - 0.5) * 0.02;
            velocities[i3 + 1] = (Math.random() - 0.5) * 0.02;
            velocities[i3 + 2] = (Math.random() - 0.5) * 0.02;
            
            // Random colors from palette
            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors[i3] = color.r;
            colors[i3 + 1] = color.g;
            colors[i3 + 2] = color.b;
            
            // Random sizes
            sizes[i] = Math.random() * 2 + 0.5;
        }
        
        particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particles.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        // Custom shader material
        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uPixelRatio: { value: renderer.getPixelRatio() }
            },
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                uniform float uTime;
                uniform float uPixelRatio;
                
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * uPixelRatio * (50.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    
                    float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                    vec3 glow = vColor * (1.0 + alpha * 0.5);
                    
                    gl_FragColor = vec4(glow, alpha * 0.8);
                }
            `,
            transparent: true,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);
        
        // Mouse interaction
        const mouse = new THREE.Vector3(0, 0, 0);
        const raycaster = new THREE.Raycaster();
        const mousePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        
        document.addEventListener('mousemove', (event) => {
            const x = (event.clientX / window.innerWidth) * 2 - 1;
            const y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            const intersection = new THREE.Vector3();
            raycaster.ray.intersectPlane(mousePlane, intersection);
            
            mouse.copy(intersection);
        });
        
        // Touch support
        document.addEventListener('touchmove', (event) => {
            const touch = event.touches[0];
            const x = (touch.clientX / window.innerWidth) * 2 - 1;
            const y = -(touch.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            const intersection = new THREE.Vector3();
            raycaster.ray.intersectPlane(mousePlane, intersection);
            
            mouse.copy(intersection);
        });
        
        // Animation
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now();
            frameCount++;
            
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
            
            time += 0.001;
            particleMaterial.uniforms.uTime.value = time;
            
            // Update particles
            const posArray = particles.attributes.position.array;
            const velArray = velocities;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                // Mouse repulsion
                const dx = posArray[i3] - mouse.x;
                const dy = posArray[i3 + 1] - mouse.y;
                const dz = posArray[i3 + 2] - mouse.z;
                const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                
                if (dist < 15) {
                    const force = (15 - dist) / 15;
                    const repulsion = force * 0.5;
                    velArray[i3] += (dx / dist) * repulsion;
                    velArray[i3 + 1] += (dy / dist) * repulsion;
                    velArray[i3 + 2] += (dz / dist) * repulsion;
                }
                
                // Orbital motion
                const angle = time * 0.1;
                const cosA = Math.cos(angle);
                const sinA = Math.sin(angle);
                
                const x = posArray[i3];
                const y = posArray[i3 + 1];
                
                posArray[i3] = x * cosA - y * sinA;
                posArray[i3 + 1] = x * sinA + y * cosA;
                
                // Apply velocity
                posArray[i3] += velArray[i3];
                posArray[i3 + 1] += velArray[i3 + 1];
                posArray[i3 + 2] += velArray[i3 + 2];
                
                // Damping
                velArray[i3] *= 0.99;
                velArray[i3 + 1] *= 0.99;
                velArray[i3 + 2] *= 0.99;
                
                // Return to original position slowly
                const origRadius = 30 + Math.random() * 20;
                const currentRadius = Math.sqrt(
                    posArray[i3] * posArray[i3] + 
                    posArray[i3 + 1] * posArray[i3 + 1]
                );
                
                if (currentRadius > origRadius + 5) {
                    posArray[i3] *= 0.995;
                    posArray[i3 + 1] *= 0.995;
                    posArray[i3 + 2] *= 0.995;
                }
            }
            
            particles.attributes.position.needsUpdate = true;
            
            // Rotate entire system
            particleSystem.rotation.y += 0.0005;
            particleSystem.rotation.x += 0.0002;
            
            // Camera subtle movement
            camera.position.x = Math.sin(time * 0.3) * 5;
            camera.position.y = Math.cos(time * 0.2) * 5;
            camera.lookAt(scene.position);
            
            composer.render();
        }
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
        });
        
        // Update particle count display
        document.getElementById('particle-count').textContent = `Particles: ${PARTICLE_COUNT.toLocaleString()}`;
        
        // Start animation
        animate();
        
        // Hide hint after first interaction
        let hintHidden = false;
        const hideHint = () => {
            if (!hintHidden) {
                hintHidden = true;
                document.querySelector('.hint').style.transition = 'opacity 1s';
                document.querySelector('.hint').style.opacity = '0';
            }
        };
        
        document.addEventListener('mousemove', hideHint, { once: true });
        document.addEventListener('touchmove', hideHint, { once: true });
    </script>
</body>
</html>
