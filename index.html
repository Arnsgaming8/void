<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Void | Immersive Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease;
            mix-blend-mode: difference;
        }
        
        .cursor.hover {
            width: 60px;
            height: 60px;
            border-color: rgba(255, 255, 255, 0.8);
        }
        
        .cursor-dot {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            transform: translate(-50%, -50%);
        }
        
        /* Hide cursor on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .cursor, .cursor-dot {
                display: none;
            }
        }
        
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #000;
            transition: opacity 1.5s ease, visibility 1.5s;
        }
        
        .intro.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .intro-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 200;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
            text-align: center;
            padding: 0 20px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        .click-prompt {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            z-index: 101;
            animation: fadeInOut 2s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }
        
        .click-prompt.hidden {
            display: none;
        }
        
        .ui {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            z-index: 50;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .ui.visible {
            opacity: 1;
        }
        
        .mode-indicator {
            position: fixed;
            top: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            z-index: 50;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .mode-indicator.visible {
            opacity: 1;
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .ui {
                bottom: 20px;
                left: 20px;
                font-size: 0.55rem;
            }
            
            .mode-indicator {
                top: 20px;
                right: 20px;
                font-size: 0.6rem;
            }
            
            .click-prompt {
                bottom: 40px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    
    <div class="intro">
        <div class="intro-text">Enter the Void</div>
    </div>
    
    <div class="click-prompt">Tap to begin</div>
    
    <div class="ui">
        <div id="mode">AUDIO REACTIVE</div>
        <div id="stats">Particles: 0</div>
    </div>
    
    <div class="mode-indicator" id="mode-indicator">🎵 Listening</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';
        
        // Detect mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                         (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches);
        
        // Cursor
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        
        // Mouse move
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';
        });
        
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            cursorDot.style.opacity = '1';
        });
        
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            cursorDot.style.opacity = '0';
        });
        
        // Touch move - update position for particle interaction
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }, { passive: true });
        
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }, { passive: true });
        
        // Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 80;
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: !isMobile, 
            alpha: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);
        
        // Post-processing - reduced for mobile
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            isMobile ? 1.5 : 2.0,
            0.5,
            0.1
        );
        composer.addPass(bloomPass);
        
        if (!isMobile) {
            const filmPass = new FilmPass(0.35, 0.025, 648, false);
            composer.addPass(filmPass);
        }
        
        // Audio setup
        let audioContext, analyser, dataArray;
        let audioInitialized = false;
        let audioLevel = 0;
        
        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.3;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // Resume context after getting permission
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                audioInitialized = true;
                document.getElementById('mode-indicator').classList.add('visible');
                console.log('Audio initialized, state:', audioContext.state);
            } catch (e) {
                console.log('Audio not available, using visual mode', e);
            }
        }
        
        function getAudioLevel() {
            if (!audioInitialized || !analyser) return 0;
            analyser.getByteFrequencyData(dataArray);
            
            // Debug: log first 10 values to see if we're getting data
            // console.log('Frequency data:', Array.from(dataArray.slice(0, 10)));
            
            let sum = 0;
            // Focus on lower frequencies for more visible reaction
            const focusRange = Math.floor(dataArray.length * 0.5);
            for (let i = 0; i < focusRange; i++) {
                sum += dataArray[i];
            }
            const level = (sum / focusRange / 255) * 2.0;
            // Debug
            // console.log('Audio level:', level.toFixed(3));
            return level;
        }
        
        // Particle count - reduced for mobile
        const PARTICLE_COUNT = isMobile ? 8000 : 25000;
        
        // Main nebula particles
        const nebulaGeometry = new THREE.BufferGeometry();
        const nebulaPositions = new Float32Array(PARTICLE_COUNT * 3);
        const nebulaVelocities = new Float32Array(PARTICLE_COUNT * 3);
        const nebulaColors = new Float32Array(PARTICLE_COUNT * 3);
        const nebulaSizes = new Float32Array(PARTICLE_COUNT);
        const nebulaPhases = new Float32Array(PARTICLE_COUNT);
        
        const colors = [
            new THREE.Color(0x00ffff),
            new THREE.Color(0xff00ff),
            new THREE.Color(0x00ff88),
            new THREE.Color(0xff3366),
            new THREE.Color(0x6633ff),
            new THREE.Color(0xffff00),
        ];
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const i3 = i * 3;
            const radius = 20 + Math.random() * 40;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            nebulaPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
            nebulaPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            nebulaPositions[i3 + 2] = radius * Math.cos(phi);
            
            nebulaVelocities[i3] = (Math.random() - 0.5) * 0.05;
            nebulaVelocities[i3 + 1] = (Math.random() - 0.5) * 0.05;
            nebulaVelocities[i3 + 2] = (Math.random() - 0.5) * 0.05;
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            nebulaColors[i3] = color.r;
            nebulaColors[i3 + 1] = color.g;
            nebulaColors[i3 + 2] = color.b;
            
            nebulaSizes[i] = Math.random() * 3 + 0.5;
            nebulaPhases[i] = Math.random() * Math.PI * 2;
        }
        
        nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeometry.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        nebulaGeometry.setAttribute('size', new THREE.BufferAttribute(nebulaSizes, 1));
        
        const nebulaMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uAudio: { value: 0 },
                uPixelRatio: { value: renderer.getPixelRatio() }
            },
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                varying float vSize;
                uniform float uTime;
                uniform float uAudio;
                uniform float uPixelRatio;
                
                void main() {
                    vColor = color;
                    vSize = size * (1.0 + uAudio * 2.0);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = vSize * uPixelRatio * (60.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vSize;
                uniform float uAudio;
                
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    
                    float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                    float glow = exp(-dist * 3.0) * (1.0 + uAudio);
                    vec3 finalColor = vColor * (1.0 + uAudio * 0.5);
                    
                    gl_FragColor = vec4(finalColor, alpha * 0.7 + glow * 0.3);
                }
            `,
            transparent: true,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const nebula = new THREE.Points(nebulaGeometry, nebulaMaterial);
        scene.add(nebula);
        
        // Ring system - reduced for mobile
        const ringCount = isMobile ? 3 : 5;
        const rings = [];
        
        for (let r = 0; r < ringCount; r++) {
            const ringGeometry = new THREE.BufferGeometry();
            const ringParticleCount = isMobile ? 200 : 500;
            const ringPositions = new Float32Array(ringParticleCount * 3);
            const ringColors = new Float32Array(ringParticleCount * 3);
            const ringSizes = new Float32Array(ringParticleCount);
            
            const ringRadius = 50 + r * 15;
            
            for (let i = 0; i < ringParticleCount; i++) {
                const i3 = i * 3;
                const angle = (i / ringParticleCount) * Math.PI * 2;
                const spread = (Math.random() - 0.5) * 5;
                
                ringPositions[i3] = Math.cos(angle) * (ringRadius + spread);
                ringPositions[i3 + 1] = Math.sin(angle) * (ringRadius + spread);
                ringPositions[i3 + 2] = (Math.random() - 0.5) * 2;
                
                const color = colors[r % colors.length];
                ringColors[i3] = color.r;
                ringColors[i3 + 1] = color.g;
                ringColors[i3 + 2] = color.b;
                
                ringSizes[i] = Math.random() * 2 + 1;
            }
            
            ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
            ringGeometry.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
            ringGeometry.setAttribute('size', new THREE.BufferAttribute(ringSizes, 1));
            
            const ringMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uAudio: { value: 0 },
                    uPixelRatio: { value: renderer.getPixelRatio() }
                },
                vertexShader: `
                    attribute float size;
                    varying vec3 vColor;
                    uniform float uTime;
                    uniform float uAudio;
                    uniform float uPixelRatio;
                    
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (40.0 / -mvPosition.z) * (1.0 + uAudio);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    uniform float uAudio;
                    
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                        gl_FragColor = vec4(vColor * (1.0 + uAudio * 0.5), alpha * 0.8);
                    }
                `,
                transparent: true,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const ring = new THREE.Points(ringGeometry, ringMaterial);
            ring.rotation.x = Math.random() * Math.PI;
            ring.rotation.y = Math.random() * Math.PI;
            rings.push(ring);
            scene.add(ring);
        }
        
        // Central sphere - reduced segments for mobile
        const sphereGeometry = new THREE.SphereGeometry(8, isMobile ? 32 : 64, isMobile ? 32 : 64);
        const sphereMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uAudio: { value: 0 }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                uniform float uTime;
                
                void main() {
                    vNormal = normal;
                    vPosition = position;
                    vec3 pos = position;
                    pos += normal * sin(position.x * 3.0 + uTime) * 0.5;
                    pos += normal * cos(position.y * 3.0 + uTime) * 0.5;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                uniform float uTime;
                uniform float uAudio;
                
                void main() {
                    vec3 color1 = vec3(0.0, 1.0, 1.0);
                    vec3 color2 = vec3(1.0, 0.0, 1.0);
                    float mixVal = sin(vPosition.x * 2.0 + vPosition.y * 2.0 + uTime) * 0.5 + 0.5;
                    vec3 color = mix(color1, color2, mixVal);
                    float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                    gl_FragColor = vec4(color * (1.0 + uAudio), 0.3 + fresnel * 0.5);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(sphere);
        
        // Mouse 3D position
        const mouse3D = new THREE.Vector3(0, 0, 0);
        const raycaster = new THREE.Raycaster();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            const y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            raycaster.ray.intersectPlane(plane, mouse3D);
        });
        
        // Touch move for 3D interaction
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                const y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
                raycaster.ray.intersectPlane(plane, mouse3D);
            }
        }, { passive: true });
        
        // Click/tap to start
        let started = false;
        let time = 0;
        
        function startExperience() {
            console.log('Starting experience, started:', started);
            if (!started) {
                started = true;
                document.querySelector('.intro').classList.add('hidden');
                document.querySelector('.click-prompt').classList.add('hidden');
                document.querySelector('.ui').classList.add('visible');
                initAudio();
            }
        }
        
        document.addEventListener('click', startExperience);
        document.addEventListener('touchstart', startExperience, { passive: true });
        
        // Debug: check if events are being caught
        document.body.addEventListener('click', () => console.log('Body click detected'));
        document.body.addEventListener('touchstart', () => console.log('Body touch detected'), { passive: true });
        
        // Animation
        let lastTime = performance.now();
        let frameCount = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now();
            frameCount++;
            
            if (currentTime - lastTime >= 1000) {
                document.getElementById('stats').textContent = `Particles: ${(PARTICLE_COUNT + ringCount * (isMobile ? 200 : 500)).toLocaleString()}`;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time += 0.005;
            
            // Get audio level
            audioLevel = getAudioLevel();
            
            // Update uniforms
            nebulaMaterial.uniforms.uTime.value = time;
            nebulaMaterial.uniforms.uAudio.value = audioLevel;
            sphereMaterial.uniforms.uTime.value = time;
            sphereMaterial.uniforms.uAudio.value = audioLevel;
            
            rings.forEach((ring, idx) => {
                ring.material.uniforms.uTime.value = time;
                ring.material.uniforms.uAudio.value = audioLevel;
                ring.rotation.z += 0.002 * (idx % 2 === 0 ? 1 : -1);
                ring.rotation.x += 0.001;
            });
            
            // Update nebula particles
            const posArray = nebulaGeometry.attributes.position.array;
            const velArray = nebulaVelocities;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                // Mouse/touch interaction
                const dx = posArray[i3] - mouse3D.x;
                const dy = posArray[i3 + 1] - mouse3D.y;
                const dz = posArray[i3 + 2] - mouse3D.z;
                const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                
                if (dist < 20) {
                    const force = (20 - dist) / 20;
                    velArray[i3] += (dx / dist) * force * 0.8;
                    velArray[i3 + 1] += (dy / dist) * force * 0.8;
                    velArray[i3 + 2] += (dz / dist) * force * 0.8;
                }
                
                // Audio reactivity - expand outward
                const expand = audioLevel * 0.1;
                posArray[i3] *= (1 + expand * 0.01);
                posArray[i3 + 1] *= (1 + expand * 0.01);
                posArray[i3 + 2] *= (1 + expand * 0.01);
                
                // Apply velocity
                posArray[i3] += velArray[i3];
                posArray[i3 + 1] += velArray[i3 + 1];
                posArray[i3 + 2] += velArray[i3 + 2];
                
                // Damping
                velArray[i3] *= 0.98;
                velArray[i3 + 1] *= 0.98;
                velArray[i3 + 2] *= 0.98;
                
                // Return to sphere
                const currentRadius = Math.sqrt(
                    posArray[i3] * posArray[i3] + 
                    posArray[i3 + 1] * posArray[i3 + 1] +
                    posArray[i3 + 2] * posArray[i3 + 2]
                );
                const targetRadius = 30 + Math.sin(nebulaPhases[i] + time) * 10;
                
                if (currentRadius > targetRadius + 10) {
                    const pull = 0.995;
                    posArray[i3] *= pull;
                    posArray[i3 + 1] *= pull;
                    posArray[i3 + 2] *= pull;
                }
            }
            
            nebulaGeometry.attributes.position.needsUpdate = true;
            
            // Rotate entire system
            nebula.rotation.y += 0.001;
            nebula.rotation.x += 0.0005;
            
            // Camera movement
            camera.position.x = Math.sin(time * 0.5) * 10;
            camera.position.y = Math.cos(time * 0.3) * 10;
            camera.lookAt(0, 0, 0);
            
            // Cursor animation (only on non-touch devices)
            if (!isMobile) {
                targetX += (mouseX - targetX) * 0.1;
                targetY += (mouseY - targetY) * 0.1;
                cursor.style.left = targetX + 'px';
                cursor.style.top = targetY + 'px';
            }
            
            composer.render();
        }
        
        // Resize handler
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            nebulaMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
            
            rings.forEach(ring => {
                ring.material.uniforms.uPixelRatio.value = renderer.getPixelRatio();
            });
        }
        
        window.addEventListener('resize', onResize);
        
        // Handle orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(onResize, 100);
        });
        
        animate();
    </script>
</body>
</html>
